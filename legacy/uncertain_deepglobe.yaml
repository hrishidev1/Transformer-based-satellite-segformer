# Configuration for Uncertainty-Aware SegFormer on DeepGlobe/deprecated
experiment_name: "uncertain_segformer_deepglobe"
seed: 42

data:
  dataset: "deepglobe"
  root_dir: "/content/drive/MyDrive/satellite-segmentation/data/DeepGlobe"
  image_size: 512
  num_classes: 7
  ignore_index: 6  # Unknown class

model:
  name: "uncertain_segformer"  # Special flag for uncertainty model
  encoder: "mit_b2"
  pretrained: true

training:
  device: "cuda"
  batch_size: 4
  epochs: 30  # Slightly more epochs for uncertainty convergence
  num_workers: 2
  checkpoint_dir: "/content/drive/MyDrive/satellite-segmentation/checkpoints"
  output_dir: "/content/drive/MyDrive/satellite-segmentation/outputs"
  grad_clip: 1.0

optimizer:
  type: "adamw"
  lr: 0.00006  # 6e-5
  weight_decay: 0.01

scheduler:
  type: "cosine"
  min_lr: 0.000001

loss:
  type: "evidential"
  lambda_kl: 0.1  # KL divergence weight (tune this: 0.05-0.2)
  use_dice: false  # Set to true for EvidentialDiceLoss

augmentation:
  color_jitter: 0.3
  blur: 0.2
  brightness_contrast: 0.5
  noise: 0.2
  center_crop_val: true

# Uncertainty-specific settings
uncertainty:
  compute_calibration: true
  save_uncertainty_maps: true
  num_visualization_samples: 20